<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R S KUMAR & ASSOCIATES | Chartered Accountants</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D2137;--navy-mid:#152D4A;--navy-light:#1E3D62;--gold:#B8963E;--gold-light:#D4AF5A;--white:#fff;--off:#F7F8FA;--border:#E2E6ED;--text:#1A202C;--tmid:#4A5568;--tmuted:#718096}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:"Inter",sans-serif;color:var(--text);background:var(--white);overflow-x:hidden;line-height:1.6}
nav{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;border-bottom:2px solid var(--gold);transition:height .3s,box-shadow .3s}
nav.sc{height:56px;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.nb{display:flex;align-items:center;gap:12px;text-decoration:none;cursor:pointer}
.nb-name{font-family:"Merriweather",serif;color:#fff;font-size:.9rem;font-weight:700;line-height:1.2}
.nb-sub{color:var(--gold-light);font-size:.6rem;font-weight:500;letter-spacing:2px;text-transform:uppercase}
.nl{display:flex;gap:4px;list-style:none;align-items:center}
.nl a{color:rgba(255,255,255,.8);text-decoration:none;font-size:.8rem;font-weight:500;padding:6px 13px;border-radius:4px;transition:color .2s,background .2s;cursor:pointer}
.nl a:hover,.nl a.active{color:#fff;background:rgba(255,255,255,.12)}
.nl .cta a{background:var(--gold);color:var(--navy);font-weight:700;padding:7px 18px;border-radius:4px}
.nl .cta a:hover{background:var(--gold-light)}
.page{display:none;padding-top:68px;min-height:100vh}
.page.active{display:block}
.hero{min-height:calc(100vh - 68px);background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 50%,#1a3550 100%);display:flex;align-items:center;padding:60px 48px;position:relative;overflow:hidden}
.hero-inner{max-width:1100px;margin:0 auto;width:100%;display:grid;grid-template-columns:1.1fr .9fr;gap:70px;align-items:center}
.hbadge{display:inline-flex;align-items:center;gap:8px;background:rgba(184,150,62,.15);border:1px solid rgba(184,150,62,.4);color:var(--gold-light);font-size:.7rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border-radius:20px;margin-bottom:22px}
.hbadge::before{content:"";width:6px;height:6px;background:var(--gold);border-radius:50%}
.hero h1{font-family:"Merriweather",serif;font-size:clamp(1.8rem,3vw,2.8rem);font-weight:900;color:#fff;line-height:1.25;margin-bottom:18px}
.hero h1 span{color:var(--gold-light)}
.hdesc{color:rgba(255,255,255,.65);font-size:.95rem;line-height:1.8;margin-bottom:32px;max-width:460px}
.hbtns{display:flex;gap:12px;flex-wrap:wrap}
.btn-gold{background:var(--gold);color:var(--navy);padding:12px 26px;font-weight:700;font-size:.83rem;letter-spacing:.5px;text-decoration:none;border-radius:4px;transition:background .2s,transform .2s;border:none;cursor:pointer;font-family:"Inter",sans-serif;display:inline-block}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-2px)}
.btn-ow{border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.85);padding:12px 26px;font-weight:600;font-size:.83rem;text-decoration:none;border-radius:4px;transition:border-color .2s,background .2s;display:inline-block;cursor:pointer}
.btn-ow:hover{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.06)}
.hstats{display:grid;grid-template-columns:1fr 1fr;gap:2px;border-radius:10px;overflow:hidden}
.sbox{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);padding:26px 20px;text-align:center}
.snum{font-family:"Merriweather",serif;font-size:2.2rem;font-weight:900;color:var(--gold-light);line-height:1}
.splus{font-size:1.2rem;color:var(--gold)}
.slbl{color:rgba(255,255,255,.5);font-size:.75rem;font-weight:500;letter-spacing:.5px;margin-top:5px}
.vms{background:var(--navy-mid);padding:52px 48px}
.vmi{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1px 1fr;gap:56px;align-items:start}
.vmdiv{background:rgba(184,150,62,.3)}
.vmlbl{font-size:.68rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.vmb h3{font-family:"Merriweather",serif;font-size:1.05rem;color:#fff;font-weight:700;line-height:1.6}
.vmb p{color:rgba(255,255,255,.5);font-size:.86rem;margin-top:8px;line-height:1.75}
.page-header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);padding:60px 48px;text-align:center;border-bottom:3px solid var(--gold)}
.page-header h1{font-family:"Merriweather",serif;color:#fff;font-size:clamp(1.8rem,3vw,2.4rem);font-weight:900;margin-bottom:10px}
.page-header p{color:rgba(255,255,255,.6);font-size:.95rem;max-width:540px;margin:0 auto}
.sec{padding:70px 48px}
.con{max-width:1100px;margin:0 auto}
.slabel{font-size:.68rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:block}
.stitle{font-family:"Merriweather",serif;font-size:clamp(1.5rem,2.5vw,2rem);font-weight:900;color:var(--navy);line-height:1.25}
.srule{width:40px;height:3px;background:var(--gold);margin:13px 0 32px;border-radius:2px}
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px;margin-top:40px}
.team-card{background:var(--white);border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(13,33,55,.08);cursor:pointer;transition:transform .3s,box-shadow .3s;border:1px solid var(--border)}
.team-card:hover{transform:translateY(-6px);box-shadow:0 12px 36px rgba(13,33,55,.15)}
.team-card img{width:100%;height:220px;object-fit:cover;object-position:top;background:var(--navy-mid)}
.team-card-body{padding:20px}
.team-card-body h3{font-family:"Merriweather",serif;font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:5px}
.team-card-body .role{color:var(--gold);font-size:.75rem;font-weight:600;margin-bottom:8px}
.team-card-body .quals{font-size:.72rem;color:var(--tmuted);margin-bottom:12px}
.view-profile{display:inline-flex;align-items:center;gap:5px;color:var(--navy);font-size:.75rem;font-weight:700}
.view-profile::after{content:" →"}
.partner-badge{background:rgba(184,150,62,.12);color:#7a5c10;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{background:var(--navy);padding:28px 32px;display:flex;gap:22px;align-items:flex-start;position:relative}
.modal-header img{width:90px;height:90px;border-radius:50%;object-fit:cover;object-position:top;border:3px solid var(--gold);flex-shrink:0;background:var(--navy-mid)}
.modal-header h2{font-family:"Merriweather",serif;color:#fff;font-size:1.2rem;font-weight:700;margin-bottom:5px}
.modal-header .mrole{color:var(--gold-light);font-size:.8rem;font-weight:600;margin-bottom:4px}
.modal-header .mquals{color:rgba(255,255,255,.6);font-size:.75rem}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(255,255,255,.3)}
.modal-body{padding:28px 32px}
.modal-body h4{font-family:"Merriweather",serif;color:var(--navy);font-size:.9rem;font-weight:700;margin:18px 0 8px;border-left:3px solid var(--gold);padding-left:10px}
.modal-body p{color:var(--tmid);font-size:.87rem;line-height:1.85;margin-bottom:10px}
.cert-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.cert-tag{background:rgba(184,150,62,.12);color:#7a5c10;font-size:.7rem;font-weight:600;padding:4px 10px;border-radius:4px}
.srv-tabs{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:36px}
.srv-tab{background:var(--off);border:1.5px solid var(--border);color:var(--navy);font-size:.78rem;font-weight:600;padding:8px 16px;border-radius:5px;cursor:pointer;transition:all .2s;font-family:"Inter",sans-serif}
.srv-tab:hover,.srv-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.srv-panel{display:none}
.srv-panel.active{display:grid;grid-template-columns:1fr 1.6fr;gap:40px;align-items:start}
.srv-icon-box{background:var(--navy);border-radius:10px;padding:40px;text-align:center;position:sticky;top:90px}
.srv-icon-box .ico{font-size:3rem;margin-bottom:16px}
.srv-icon-box h2{font-family:"Merriweather",serif;color:#fff;font-size:1.1rem;font-weight:700;margin-bottom:10px}
.srv-icon-box p{color:rgba(255,255,255,.55);font-size:.82rem;line-height:1.75}
.srv-detail h3{font-family:"Merriweather",serif;color:var(--navy);font-size:1rem;font-weight:700;margin-bottom:16px;border-bottom:2px solid var(--gold);padding-bottom:10px}
.srv-detail ul{list-style:none;padding:0}
.srv-detail ul li{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);color:var(--tmid);font-size:.86rem;line-height:1.6}
.srv-detail ul li::before{content:"✶";color:var(--gold);font-size:.65rem;flex-shrink:0;margin-top:4px}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.tc{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:26px;border-radius:8px}
.qm{font-family:"Merriweather",serif;font-size:2.8rem;color:var(--gold);line-height:.5;margin-bottom:12px;display:block}
.tc p{color:rgba(255,255,255,.7);font-size:.86rem;line-height:1.8;font-style:italic;margin-bottom:18px}
.ta{display:flex;align-items:center;gap:10px}
.tav{width:36px;height:36px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:.82rem;flex-shrink:0}
.tname{color:#fff;font-weight:600;font-size:.86rem}
.trole{color:rgba(255,255,255,.4);font-size:.73rem}
.apl{display:grid;grid-template-columns:1fr 1.4fr;gap:48px;align-items:start}
.aib{background:var(--navy);padding:36px;border-radius:8px}
.aib h3{font-family:"Merriweather",serif;font-size:1.2rem;color:#fff;margin-bottom:5px}
.aib .sub{color:rgba(255,255,255,.45);font-size:.83rem;margin-bottom:26px}
.ir{display:flex;gap:12px;align-items:flex-start;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.ir:last-child{border-bottom:none}
.iico{width:34px;height:34px;background:rgba(184,150,62,.15);border:1px solid rgba(184,150,62,.3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.ilbl{color:var(--gold-light);font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
.ival{color:rgba(255,255,255,.65);font-size:.84rem;line-height:1.55}
.ival a{color:rgba(255,255,255,.65);text-decoration:none}
.afw{background:#fff;padding:36px;border-radius:8px;border:1px solid var(--border);box-shadow:0 4px 28px rgba(13,33,55,.08)}
.afw h3{font-family:"Merriweather",serif;font-size:1.2rem;color:var(--navy);margin-bottom:4px}
.fnote{color:var(--tmuted);font-size:.8rem;margin-bottom:22px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.7rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--navy);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:5px;font-family:"Inter",sans-serif;font-size:.87rem;color:var(--text);background:var(--off);outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--navy);background:#fff}
.fg textarea{resize:vertical;min-height:84px}
.bsub{width:100%;background:var(--navy);color:#fff;border:none;padding:13px;font-family:"Inter",sans-serif;font-size:.83rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:5px;cursor:pointer;margin-top:5px;transition:background .2s}
.bsub:hover{background:var(--navy-light)}
.fsuc{display:none;text-align:center;padding:46px 20px}
.ck{width:60px;height:60px;background:rgba(13,33,55,.07);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.9rem;margin:0 auto 16px}
.fsuc h4{font-family:"Merriweather",serif;color:var(--navy);font-size:1.25rem;margin-bottom:7px}
.fsuc p{color:var(--tmuted);font-size:.88rem}
.ctab{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);padding:60px 48px;text-align:center;position:relative}
.ctab::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.ctab h2{font-family:"Merriweather",serif;font-size:clamp(1.4rem,2.5vw,1.9rem);color:#fff;margin-bottom:12px;font-weight:900}
.ctab p{color:rgba(255,255,255,.6);font-size:.92rem;max-width:540px;margin:0 auto 26px;line-height:1.75}
footer{background:#080F19;padding:52px 48px 26px}
.ft{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:44px;padding-bottom:36px;border-bottom:1px solid rgba(255,255,255,.07)}
.fb p{color:rgba(255,255,255,.38);font-size:.8rem;line-height:1.75;margin-top:10px}
.fc h4{color:var(--gold-light);font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.fc ul{list-style:none}
.fc ul li{margin-bottom:9px}
.fc ul li a{color:rgba(255,255,255,.4);font-size:.81rem;text-decoration:none;cursor:pointer;transition:color .2s}
.fc ul li a:hover{color:var(--gold-light)}
.cl{display:flex;gap:7px;align-items:flex-start;margin-bottom:9px}
.cl span{color:var(--gold);font-size:.78rem;flex-shrink:0;margin-top:1px}
.cl p,.cl a{color:rgba(255,255,255,.4);font-size:.8rem;line-height:1.5;text-decoration:none}
.fbot{max-width:1100px;margin:0 auto;padding-top:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.fc2{color:rgba(255,255,255,.2);font-size:.73rem}
@media(max-width:800px){
nav{padding:0 16px}.nl li:not(.cta){display:none}
.hero{padding:40px 16px}.hero-inner{grid-template-columns:1fr}
.vms{padding:36px 16px}.vmi{grid-template-columns:1fr}.vmdiv{display:none}
.sec{padding:40px 16px}.page-header{padding:40px 16px}
.tgrid{grid-template-columns:1fr}.apl{grid-template-columns:1fr}
.fgrid{grid-template-columns:1fr}.ft{grid-template-columns:1fr 1fr}
.ctab{padding:44px 16px}.srv-panel.active{grid-template-columns:1fr}.srv-icon-box{position:static}}
</style>
</head>
